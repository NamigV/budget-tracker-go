services:
  db:
    image: postgres:17
    container_name: budget_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: budget_tracker
      POSTGRES_PASSWORD: budget_tracker
      POSTGRES_DB: budget_tracker
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  pgdata:
